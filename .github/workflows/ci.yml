name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bsk-integration-hub/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bsk-integration-hub/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest -q

  frontend:
    name: Admin panel (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bsk-integration-hub/frontend/admin-panel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bsk-integration-hub/frontend/admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
