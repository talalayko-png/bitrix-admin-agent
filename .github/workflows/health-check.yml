name: Health check (prod)

# «Отложенная самопроверка»: раз в час дёргаем публичный /health прода.
# Если прод не отвечает ИЛИ внезапно вышел из dry-run — открываем issue
# (или дополняем уже открытый комментарием). Ресурсы: ~10 секунд раз в час.

on:
  schedule:
    - cron: "17 * * * *"   # каждый час; :17 — чтобы не толкаться в очереди GH в :00
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  ping:
    name: Ping https://hub.bsk-grupp.ru/health
    runs-on: ubuntu-latest
    steps:
      - name: Check /health and dry-run flag
        id: ping
        run: |
          body=$(curl -s --max-time 20 https://hub.bsk-grupp.ru/health || echo '{}')
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://hub.bsk-grupp.ru/health || echo 000)
          dry_run=$(echo "$body" | jq -r '.dry_run // "unknown"')
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
          echo "HTTP $code, dry_run=$dry_run"
          if [ "$code" != "200" ]; then
            echo "problem=Прод не отвечает: /health вернул HTTP $code" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$dry_run" != "true" ]; then
            echo "problem=ВНИМАНИЕ: dry_run=$dry_run — прод вышел из режима «только чтение»!" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Open or update alert issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🚨 Health check: проблема на проде hub.bsk-grupp.ru";
            const problem = `${{ steps.ping.outputs.problem }}` || "проверка /health не прошла";
            const body = `${new Date().toISOString()}: ${problem}\n\n` +
              `Подробности: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open",
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body,
              });
            }
